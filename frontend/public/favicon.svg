<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="eg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Orbital ring -->
  <ellipse cx="50" cy="50" rx="36" ry="18" fill="none" stroke="#60A5FA" stroke-width="2.5" stroke-dasharray="5 3" opacity="0.5" transform="rotate(-30 50 50)"/>
  <ellipse cx="50" cy="50" rx="36" ry="18" fill="none" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4" transform="rotate(30 50 50)"/>
  <!-- "E" letter -->
  <text x="50" y="66" font-size="52" text-anchor="middle" fill="url(#eg)" font-family="Arial Black, Arial" font-weight="900" filter="url(#glow)">E</text>
  <!-- Circuit dots -->
  <circle cx="28" cy="38" r="2.5" fill="#60A5FA" opacity="0.8"/>
  <circle cx="72" cy="62" r="2.5" fill="#06B6D4" opacity="0.8"/>
  <circle cx="75" cy="35" r="2" fill="#60A5FA" opacity="0.6"/>
  <circle cx="25" cy="65" r="2" fill="#06B6D4" opacity="0.6"/>
</svg>
